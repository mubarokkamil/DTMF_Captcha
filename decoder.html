<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToneGuard — Decoder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f3ef;
  --surface:   #ffffff;
  --border:    #e0dbd2;
  --border2:   #c8c0b4;
  --text:      #1a1814;
  --text-2:    #5a5248;
  --text-3:    #9a9088;
  --accent:    #1a3a2a;
  --accent2:   #2d6a4f;
  --accent-lt: #e8f4ec;
  --err:       #c0392b;
  --success:   #1e6b3c;
  --success-lt:#e8f5ed;
  --mono:      'IBM Plex Mono', monospace;
  --display:   'Syne', sans-serif;
  --body:      'Lora', serif;
  --radius:    6px;
  --shadow-lg: 0 2px 8px rgba(0,0,0,0.1), 0 12px 40px rgba(0,0,0,0.1);
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.4;
  pointer-events: none;
}

.brand {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 32px; gap: 10px; z-index: 100;
}

.brand-mark { width:28px; height:28px; background:var(--accent); border-radius:4px; display:flex; align-items:center; justify-content:center; }
.brand-mark svg { width:16px; height:16px; fill:#fff; }
.brand-name { font-family:var(--display); font-size:15px; font-weight:700; color:var(--accent); letter-spacing:0.03em; }
.brand-sep  { width:1px; height:20px; background:var(--border); margin:0 8px; }
.brand-sub  { font-family:var(--mono); font-size:10px; color:var(--text-3); letter-spacing:0.1em; text-transform:uppercase; }
.back-link  { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--accent2); text-decoration:none; border-bottom:1px dashed var(--accent2); }
.back-link:hover { opacity:0.7; }

.page {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 20px 40px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 520px;
  overflow: hidden;
}

.card-header {
  padding: 28px 32px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 16px;
}

.icon-box {
  width:44px; height:44px;
  background:var(--accent-lt);
  border:1px solid rgba(26,58,42,0.15);
  border-radius:8px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.icon-box svg { width:22px; height:22px; fill:var(--accent2); }

.card-header-text h1 { font-family:var(--display); font-size:19px; font-weight:700; color:var(--text); line-height:1.2; margin-bottom:4px; }
.card-header-text p  { font-size:13px; color:var(--text-2); font-family:var(--body); font-style:italic; }

.card-body { padding: 28px 32px; }

/* ── Drop zone ── */
.drop-zone {
  border: 2px dashed var(--border2);
  border-radius: 8px;
  padding: 36px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg);
  margin-bottom: 24px;
  position: relative;
}

.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent2);
  background: var(--accent-lt);
}

.drop-zone input[type=file] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; width: 100%; height: 100%;
}

.drop-icon {
  width: 48px; height: 48px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
}

.drop-icon svg { width: 24px; height: 24px; fill: var(--text-3); }

.drop-title {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.drop-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.05em;
}

.drop-zone.has-file .drop-icon svg { fill: var(--accent2); }
.drop-zone.has-file { border-color: var(--accent2); background: var(--accent-lt); }

/* ── Waveform ── */
.waveform-wrap {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 20px;
}

.waveform-label {
  font-family: var(--mono); font-size: 9px;
  color: var(--text-3); letter-spacing: 0.15em;
  text-transform: uppercase; margin-bottom: 6px;
  display: flex; justify-content: space-between;
}

#wave-canvas { width:100%; height:52px; display:block; }

/* ── Decode button ── */
.btn-decode {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: var(--display);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}

.btn-decode:hover { background: var(--accent2); }
.btn-decode:active { transform: scale(0.98); }
.btn-decode:disabled { background: var(--border2); cursor: not-allowed; }
.btn-decode svg { width:16px; height:16px; fill:#fff; }

/* ── Progress ── */
.progress-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
  display: none;
}

#progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent2), #52b788);
  border-radius: 2px;
  transition: width 0.1s linear;
}

/* ── Result ── */
.result-section { display: none; }

.result-label {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-3); letter-spacing: 0.15em;
  text-transform: uppercase; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}

.confidence-badge {
  font-family: var(--mono); font-size: 10px;
  padding: 2px 8px; border-radius: 10px;
  background: var(--accent-lt); color: var(--accent2);
  border: 1px solid rgba(45,106,79,0.2);
}

/* ── Digit result display ── */
.digit-row {
  display: flex; gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
}

.digit-box {
  width: 52px; height: 64px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(12px) scale(0.9); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.digit-box .d-num {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1;
}

.digit-box .d-idx {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--text-3);
  letter-spacing: 0.1em;
}

/* ── Copy area ── */
.copy-area {
  display: flex; gap: 8px; margin-bottom: 16px;
}

.code-display {
  flex: 1;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 16px;
  font-family: var(--mono);
  font-size: 22px;
  letter-spacing: 0.25em;
  color: var(--accent);
  font-weight: 500;
  user-select: all;
}

.btn-copy {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 16px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-2);
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}

.btn-copy:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-copy svg { width:14px; height:14px; fill:currentColor; }
.btn-copy.copied { background: var(--success-lt); border-color: #a8d5b5; color: var(--success); }

/* ── Debug table ── */
.debug-wrap {
  margin-top: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.debug-header {
  padding: 8px 14px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  display: flex; justify-content: space-between;
}

.debug-body {
  display: none;
  padding: 12px 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-2);
  line-height: 1.8;
  overflow-x: auto;
}

.debug-body.open { display: block; }

.freq-row { display: flex; gap: 8px; align-items: center; margin-bottom: 3px; }
.freq-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.freq-bar { height:100%; background:var(--accent2); border-radius:3px; transition:width 0.3s; }

/* ── Error ── */
.error-box {
  background: #fef0ef; border: 1px solid #f5b7b1;
  border-radius: var(--radius); padding: 12px 16px;
  color: var(--err); font-size: 13px; display: none;
  align-items: center; gap: 8px; margin-bottom: 16px;
}
.error-box svg { width:16px; height:16px; fill:currentColor; flex-shrink:0; }

.card-footer {
  padding: 14px 32px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.05em;
  display: flex; justify-content: space-between; align-items: center;
}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-mark">
    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
  </div>
  <span class="brand-name">ToneGuard</span>

  <a href="captcha.html" class="back-link">← Back to CAPTCHA</a>
</div>

<div class="page">
  <div class="card">

    <div class="card-header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg>

        <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
        Decode DTMF Tones
      </button>

      <!-- Progress -->
      <div class="progress-wrap" id="progress-wrap">
        <div id="progress-bar"></div>
      </div>

      <!-- Result -->
      <div class="result-section" id="result-section">

        <div class="result-label">
          <span>Decoded Digits</span>

        </div>

        <div class="digit-row" id="digit-row"></div>

        <div class="copy-area">

          <button class="btn-copy" id="btn-copy">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            Copy Code

        <div class="debug-wrap">

<script>
// ── DTMF frequency table ──────────────────────────────────────
const ROW_FREQS = [697, 770, 852, 941];
const COL_FREQS = [1209, 1336, 1477, 1633];
const DTMF_MAP  = [
  ['1','2','3','A'],
  ['4','5','6','B'],
  ['7','8','9','C'],
  ['*','0','#','D']
];

// ── Goertzel algorithm ────────────────────────────────────────
// Computes the energy at one specific frequency in a sample block.
// Far more efficient than FFT when you only need a few frequencies.
function goertzel(samples, targetFreq, sampleRate) {
  const N       = samples.length;
  const k       = Math.round(N * targetFreq / sampleRate);
  const omega   = 2 * Math.PI * k / N;
  const coeff   = 2 * Math.cos(omega);
  let q1 = 0, q2 = 0;

  for (let i = 0; i < N; i++) {
    const q0 = samples[i] + coeff * q1 - q2;
    q2 = q1; q1 = q0;
  }

  // Return power (magnitude squared)
  return q1*q1 + q2*q2 - q1*q2*coeff;
}

// ── Detect one digit in a sample window ───────────────────────
function detectDigit(samples, sampleRate) {
  const rowEnergies = ROW_FREQS.map(f => goertzel(samples, f, sampleRate));
  const colEnergies = COL_FREQS.map(f => goertzel(samples, f, sampleRate));

  const maxRow = Math.max(...rowEnergies);
  const maxCol = Math.max(...colEnergies);
  const total  = rowEnergies.reduce((s,v)=>s+v,0) + colEnergies.reduce((s,v)=>s+v,0);

  // Silence threshold — if total energy too low, return null
  if (total < 1e6) return { digit: null, rowE: rowEnergies, colE: colEnergies };

  // Dominant frequencies must be significantly stronger than others
  const rowIdx = rowEnergies.indexOf(maxRow);
  const colIdx = colEnergies.indexOf(maxCol);

  // Check dominance ratio: strongest must be > 2x second strongest
  const rowSorted = [...rowEnergies].sort((a,b)=>b-a);
  const colSorted = [...colEnergies].sort((a,b)=>b-a);

  if (rowSorted[0] < rowSorted[1] * 1.5) return { digit: null, rowE: rowEnergies, colE: colEnergies };
  if (colSorted[0] < colSorted[1] * 1.5) return { digit: null, rowE: rowEnergies, colE: colEnergies };

  return {
    digit:  DTMF_MAP[rowIdx][colIdx],
    rowIdx, colIdx,
    rowE: rowEnergies, colE: colEnergies,
    confidence: Math.min(rowSorted[0]/rowSorted[1], colSorted[0]/colSorted[1])
  };
}

// ── Parse WAV file ────────────────────────────────────────────
function parseWav(arrayBuffer) {
  const view       = new DataView(arrayBuffer);
  const riff       = String.fromCharCode(...[0,1,2,3].map(i=>view.getUint8(i)));
  if (riff !== 'RIFF') throw new Error('Not a valid WAV file');

  const audioFmt   = view.getUint16(20, true);
  if (audioFmt !== 1) throw new Error('Only PCM WAV supported (no compression)');

  const channels   = view.getUint16(22, true);
  const sampleRate = view.getUint32(24, true);
  const bitsPerSmp = view.getUint16(34, true);

  // Find data chunk
  let dataOffset = 12;
  while (dataOffset < view.byteLength - 8) {
    const id  = String.fromCharCode(...[0,1,2,3].map(i=>view.getUint8(dataOffset+i)));
    const sz  = view.getUint32(dataOffset+4, true);
    if (id === 'data') { dataOffset += 8; break; }
    dataOffset += 8 + sz;
  }

  // Read samples (take left channel only)
  const samples = [];
  const stride  = channels * (bitsPerSmp / 8);
  for (let i = dataOffset; i + stride <= view.byteLength; i += stride) {
    let val;
    if (bitsPerSmp === 16) val = view.getInt16(i, true) / 32768;
    else if (bitsPerSmp === 8) val = (view.getUint8(i) - 128) / 128;
    else if (bitsPerSmp === 32) val = view.getInt32(i, true) / 2147483648;
    else val = 0;
    samples.push(val);
  }

  return { samples, sampleRate, channels, bitsPerSmp };
}

// ── Main decode ───────────────────────────────────────────────
function decodeDTMF(samples, sampleRate, onProgress) {
  // Window size: 40ms — good balance for Goertzel accuracy
  const windowMs   = 40;
  const windowSamp = Math.floor(sampleRate * windowMs / 1000);
  const stepSamp   = Math.floor(windowSamp / 2);   // 50% overlap

  const rawDigits  = [];
  const total      = Math.floor((samples.length - windowSamp) / stepSamp);

  for (let i = 0; i + windowSamp <= samples.length; i += stepSamp) {
    const window = samples.slice(i, i + windowSamp);
    const result = detectDigit(window, sampleRate);
    rawDigits.push(result);
    if (i % (stepSamp * 20) === 0) onProgress(i / samples.length * 100);
  }

  // Collapse consecutive same-digit runs → single digit
  // Filter out nulls first, then collapse runs
  const digits    = [];
  const debugInfo = [];
  let   lastDigit = null;
  let   runCount  = 0;
  let   runConf   = [];

  rawDigits.forEach(r => {
    if (r.digit === null) {
      if (lastDigit !== null && runCount >= 2) {
        // End of a run — commit it
        const avgConf = runConf.reduce((s,v)=>s+v,0)/runConf.length;
        digits.push(lastDigit);
        debugInfo.push({ digit: lastDigit, frames: runCount, confidence: avgConf });
      }
      lastDigit = null;
      runCount  = 0;
      runConf   = [];
    } else if (r.digit === lastDigit) {
      runCount++;
      if (r.confidence) runConf.push(r.confidence);
    } else {
      if (lastDigit !== null && runCount >= 2) {
        const avgConf = runConf.reduce((s,v)=>s+v,0)/runConf.length;
        digits.push(lastDigit);
        debugInfo.push({ digit: lastDigit, frames: runCount, confidence: avgConf });
      }
      lastDigit = r.digit;
      runCount  = 1;
      runConf   = r.confidence ? [r.confidence] : [];
    }
  });

  // Flush last run
  if (lastDigit !== null && runCount >= 2) {
    const avgConf = runConf.reduce((s,v)=>s+v,0)/runConf.length;
    digits.push(lastDigit);
    debugInfo.push({ digit: lastDigit, frames: runCount, confidence: avgConf });
  }

  return { digits, debugInfo };
}

// ── Draw waveform preview ─────────────────────────────────────
function drawWaveform(samples, sampleRate) {
  const canvas = document.getElementById('wave-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width  = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = '#2d6a4f';
  ctx.lineWidth   = 1.5;
  ctx.shadowColor = '#2d6a4f';
  ctx.shadowBlur  = 3;

  const step = Math.ceil(samples.length / W);
  ctx.beginPath();
  for (let i = 0; i < W; i++) {
    let max = 0;
    for (let j = i*step; j < (i+1)*step && j < samples.length; j++) {
      if (Math.abs(samples[j]) > max) max = Math.abs(samples[j]);
    }
    const y = (1 - max) * H / 2;
    i === 0 ? ctx.moveTo(0, H/2) : ctx.lineTo(i, H/2 - max * H/2);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  document.getElementById('wave-info').textContent =
    `${(samples.length/sampleRate).toFixed(2)}s · ${sampleRate}Hz · ${(samples.length/1000).toFixed(0)}k samples`;
}

// ── UI helpers ────────────────────────────────────────────────
function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-text').textContent = msg;
  box.style.display = 'flex';
  setTimeout(() => box.style.display = 'none', 5000);
}

function showResult(digits, debugInfo) {
  const section = document.getElementById('result-section');
  section.style.display = 'block';

  const code    = digits.join('');
  const row     = document.getElementById('digit-row');
  row.innerHTML = '';

  digits.forEach((d, i) => {
    const box = document.createElement('div');
    box.className = 'digit-box';
    box.style.animationDelay = (i * 80) + 'ms';
    box.innerHTML = `<div class="d-num">${d}</div><div class="d-idx">#${i+1}</div>`;
    row.appendChild(box);
  });

  document.getElementById('code-display').textContent = code || '——————';

  const avgConf = debugInfo.length
    ? debugInfo.reduce((s,d)=>s+d.confidence,0)/debugInfo.length
    : 0;
  document.getElementById('confidence-badge').textContent =
    `${digits.length} digits · ${(Math.min(avgConf, 99.9)).toFixed(1)}× confidence`;

  // Debug table
  const dbg = document.getElementById('debug-body');
  dbg.innerHTML = debugInfo.map(d =>
    `<div class="freq-row">
      <span style="width:12px;color:var(--accent);font-weight:600">${d.digit}</span>
      <span style="width:60px;color:var(--text-3)">${d.frames} frames</span>
      <div class="freq-bar-wrap">
        <div class="freq-bar" style="width:${Math.min(d.confidence/10*100,100)}%"></div>
      </div>
      <span style="width:40px;text-align:right">${d.confidence.toFixed(1)}×</span>
    </div>`
  ).join('');
}

// ── State ─────────────────────────────────────────────────────
let loadedSamples    = null;
let loadedSampleRate = null;

// ── File handling ─────────────────────────────────────────────
function handleFile(file) {
  if (!file || !file.name.endsWith('.wav')) {
    showError('Please upload a .wav file.');
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const { samples, sampleRate } = parseWav(e.target.result);
      loadedSamples    = samples;
      loadedSampleRate = sampleRate;

      // Show waveform
      document.getElementById('wave-wrap').style.display = 'block';
      drawWaveform(samples, sampleRate);

      // Update drop zone
      const dz = document.getElementById('drop-zone');
      dz.classList.add('has-file');
      document.getElementById('drop-title').textContent = file.name;

      // Enable decode
      document.getElementById('btn-decode').disabled = false;
      document.getElementById('result-section').style.display = 'none';

    } catch(err) {
      showError(err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('file-input').addEventListener('change', e => {
  handleFile(e.target.files[0]);
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ── Decode button ─────────────────────────────────────────────
document.getElementById('btn-decode').addEventListener('click', () => {
  if (!loadedSamples) return;

  document.getElementById('btn-decode').disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';

  // Run in next frame so UI updates
  setTimeout(() => {
    try {
      const { digits, debugInfo } = decodeDTMF(
        loadedSamples,
        loadedSampleRate,
        pct => { document.getElementById('progress-bar').style.width = pct + '%'; }
      );

      document.getElementById('progress-bar').style.width = '100%';
      setTimeout(() => {
        document.getElementById('progress-wrap').style.display = 'none';
        document.getElementById('progress-bar').style.width = '0%';

        if (digits.length === 0) {
          showError('No DTMF tones detected. Make sure the WAV contains ToneGuard audio.');
        } else {
          showResult(digits, debugInfo);
        }
        document.getElementById('btn-decode').disabled = false;
      }, 400);

    } catch(err) {
      showError(err.message);
      document.getElementById('btn-decode').disabled = false;
      document.getElementById('progress-wrap').style.display = 'none';
    }
  }, 50);
});

// ── Copy button ───────────────────────────────────────────────
document.getElementById('btn-copy').addEventListener('click', function() {
  const code = document.getElementById('code-display').textContent;
  navigator.clipboard.writeText(code).then(() => {
    this.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Copied!`;
    this.classList.add('copied');
    setTimeout(() => {
      this.innerHTML = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Code`;
      this.classList.remove('copied');
    }, 2000);
  });
});

// ── Debug toggle ──────────────────────────────────────────────
document.getElementById('debug-toggle').addEventListener('click', () => {
  document.getElementById('debug-body').classList.toggle('open');
});
</script>
