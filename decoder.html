<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToneGuard — Decoder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f3ef; --surface:#ffffff; --border:#e0dbd2; --border2:#c8c0b4;
  --text:#1a1814; --text-2:#5a5248; --text-3:#9a9088;
  --accent:#1a3a2a; --accent2:#2d6a4f; --accent-lt:#e8f4ec;
  --err:#c0392b; --success:#1e6b3c; --success-lt:#e8f5ed;
  --mono:'IBM Plex Mono',monospace; --display:'Syne',sans-serif; --body:'Lora',serif;
  --radius:6px; --shadow-lg:0 2px 8px rgba(0,0,0,0.1),0 12px 40px rgba(0,0,0,0.1);
}
html,body { min-height:100%; background:var(--bg); color:var(--text); font-family:var(--body); font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:40px 40px; opacity:0.4; pointer-events:none; }
.brand { position:fixed; top:0; left:0; right:0; height:52px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 32px; gap:10px; z-index:100; }
.brand-mark { width:28px; height:28px; background:var(--accent); border-radius:4px; display:flex; align-items:center; justify-content:center; }
.brand-mark svg { width:16px; height:16px; fill:#fff; }
.brand-name { font-family:var(--display); font-size:15px; font-weight:700; color:var(--accent); letter-spacing:0.03em; }
.brand-sep  { width:1px; height:20px; background:var(--border); margin:0 8px; }
.brand-sub  { font-family:var(--mono); font-size:10px; color:var(--text-3); letter-spacing:0.1em; text-transform:uppercase; }
.back-link  { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--accent2); text-decoration:none; border-bottom:1px dashed var(--accent2); }
.back-link:hover { opacity:0.7; }
.page { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px 40px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow-lg); width:100%; max-width:520px; overflow:hidden; }
.card-header { padding:28px 32px 24px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:16px; }
.icon-box { width:44px; height:44px; background:var(--accent-lt); border:1px solid rgba(26,58,42,0.15); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.icon-box svg { width:22px; height:22px; fill:var(--accent2); }
.card-header-text h1 { font-family:var(--display); font-size:19px; font-weight:700; color:var(--text); line-height:1.2; margin-bottom:4px; }
.card-header-text p  { font-size:13px; color:var(--text-2); font-family:var(--body); font-style:italic; }
.card-body { padding:28px 32px; }
.drop-zone { border:2px dashed var(--border2); border-radius:8px; padding:36px 24px; text-align:center; cursor:pointer; transition:all 0.2s; background:var(--bg); margin-bottom:24px; position:relative; }
.drop-zone:hover,.drop-zone.drag-over { border-color:var(--accent2); background:var(--accent-lt); }
.drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-icon { width:48px; height:48px; background:var(--surface); border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; }
.drop-icon svg { width:24px; height:24px; fill:var(--text-3); }
.drop-title { font-family:var(--display); font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; }
.drop-sub { font-family:var(--mono); font-size:11px; color:var(--text-3); letter-spacing:0.05em; }
.drop-zone.has-file .drop-icon svg { fill:var(--accent2); }
.drop-zone.has-file { border-color:var(--accent2); background:var(--accent-lt); }
.waveform-wrap { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:20px; display:none; }
.waveform-label { font-family:var(--mono); font-size:9px; color:var(--text-3); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:6px; display:flex; justify-content:space-between; }
#wave-canvas { width:100%; height:52px; display:block; }
.btn-decode { width:100%; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-family:var(--display); font-size:14px; font-weight:700; letter-spacing:0.04em; cursor:pointer; transition:all 0.15s; margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-decode:hover { background:var(--accent2); }
.btn-decode:active { transform:scale(0.98); }
.btn-decode:disabled { background:var(--border2); cursor:not-allowed; }
.btn-decode svg { width:16px; height:16px; fill:#fff; }
.progress-wrap { height:3px; background:var(--border); border-radius:2px; margin-bottom:20px; overflow:hidden; display:none; }
#progress-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),#52b788); border-radius:2px; transition:width 0.1s linear; }
.result-section { display:none; }
.result-label { font-family:var(--mono); font-size:10px; color:var(--text-3); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.confidence-badge { font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:10px; background:var(--accent-lt); color:var(--accent2); border:1px solid rgba(45,106,79,0.2); }
.digit-row { display:flex; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.digit-box { width:52px; height:64px; background:var(--bg); border:1.5px solid var(--border); border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes slideUp { from{opacity:0;transform:translateY(12px) scale(0.9)} to{opacity:1;transform:translateY(0) scale(1)} }
.digit-box .d-num { font-family:var(--mono); font-size:26px; font-weight:500; color:var(--accent); line-height:1; }
.digit-box .d-idx { font-family:var(--mono); font-size:8px; color:var(--text-3); letter-spacing:0.1em; }
.copy-area { display:flex; gap:8px; margin-bottom:16px; }
.code-display { flex:1; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius); padding:11px 16px; font-family:var(--mono); font-size:22px; letter-spacing:0.25em; color:var(--accent); font-weight:500; user-select:all; }
.btn-copy { background:var(--bg); border:1.5px solid var(--border); border-radius:var(--radius); padding:11px 16px; cursor:pointer; font-family:var(--mono); font-size:12px; color:var(--text-2); transition:all 0.15s; display:flex; align-items:center; gap:6px; white-space:nowrap; }
.btn-copy:hover { border-color:var(--accent2); color:var(--accent2); }
.btn-copy svg { width:14px; height:14px; fill:currentColor; }
.btn-copy.copied { background:var(--success-lt); border-color:#a8d5b5; color:var(--success); }
.debug-wrap { margin-top:16px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.debug-header { padding:8px 14px; background:var(--bg); border-bottom:1px solid var(--border); font-family:var(--mono); font-size:9px; color:var(--text-3); letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; display:flex; justify-content:space-between; }
.debug-body { display:none; padding:12px 14px; font-family:var(--mono); font-size:11px; color:var(--text-2); line-height:1.8; overflow-x:auto; }
.debug-body.open { display:block; }
.freq-row { display:flex; gap:8px; align-items:center; margin-bottom:4px; }
.freq-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.freq-bar { height:100%; background:var(--accent2); border-radius:3px; }
.error-box { background:#fef0ef; border:1px solid #f5b7b1; border-radius:var(--radius); padding:12px 16px; color:var(--err); font-size:13px; display:none; align-items:center; gap:8px; margin-bottom:16px; }
.error-box svg { width:16px; height:16px; fill:currentColor; flex-shrink:0; }
.card-footer { padding:14px 32px; border-top:1px solid var(--border); background:var(--bg); font-family:var(--mono); font-size:10px; color:var(--text-3); letter-spacing:0.05em; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-mark"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
  <span class="brand-name">ToneGuard</span>
  <div class="brand-sep"></div>
  <span class="brand-sub">Decoder</span>
  <a href="captcha.html" class="back-link">← Back to CAPTCHA</a>
</div>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="icon-box">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 9h-2V5h2v6zm0 4h-2v-2h2v2z"/></svg>
      </div>
      <div class="card-header-text">
        <h1>DTMF Decoder</h1>
        <p>Upload the WAV file to extract your verification code.</p>
      </div>
    </div>

    <div class="card-body">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".wav,audio/wav,audio/*">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6zm-2 16a2 2 0 110-4 2 2 0 010 4z"/></svg>
        </div>
        <div class="drop-title" id="drop-title">Drop WAV file here</div>
        <div class="drop-sub">or click to browse · .wav files only</div>
      </div>

      <div class="waveform-wrap" id="wave-wrap">
        <div class="waveform-label">
          <span>Waveform Preview</span>
          <span id="wave-info">—</span>
        </div>
        <canvas id="wave-canvas"></canvas>
      </div>

      <div class="error-box" id="error-box">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <span id="error-text">Error</span>
      </div>

      <button class="btn-decode" id="btn-decode" disabled>
        <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
        Decode DTMF Tones
      </button>

      <div class="progress-wrap" id="progress-wrap">
        <div id="progress-bar"></div>
      </div>

      <div class="result-section" id="result-section">
        <div class="result-label">
          <span>Decoded Digits</span>
          <span class="confidence-badge" id="confidence-badge">—</span>
        </div>
        <div class="digit-row" id="digit-row"></div>
        <div class="copy-area">
          <div class="code-display" id="code-display">——————</div>
          <button class="btn-copy" id="btn-copy">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            Copy Code
          </button>
        </div>
        <div class="debug-wrap">
          <div class="debug-header" id="debug-toggle">
            <span>Signal Analysis</span><span id="debug-arrow">▼</span>
          </div>
          <div class="debug-body" id="debug-body"></div>
        </div>
      </div>
    </div>

    <div class="card-footer">
      <span>ToneGuard · Goertzel DTMF Decoder</span>
      <span>No data sent to any server</span>
    </div>
  </div>
</div>

<script>
// ── DTMF table ────────────────────────────────────────────────
const ROW_FREQS = [697, 770, 852, 941];
const COL_FREQS = [1209, 1336, 1477, 1633];
const DTMF_MAP  = [
  ['1','2','3','A'],
  ['4','5','6','B'],
  ['7','8','9','C'],
  ['*','0','#','D']
];

// ── Goertzel ──────────────────────────────────────────────────
function goertzel(samples, targetFreq, sampleRate) {
  const N     = samples.length;
  const k     = Math.round(N * targetFreq / sampleRate);
  const omega = 2 * Math.PI * k / N;
  const coeff = 2 * Math.cos(omega);
  let q1 = 0, q2 = 0;
  for (let i = 0; i < N; i++) {
    const q0 = samples[i] + coeff * q1 - q2;
    q2 = q1; q1 = q0;
  }
  return q1*q1 + q2*q2 - q1*q2*coeff;
}

// ── Detect digit in one window ────────────────────────────────
function detectDigit(samples, sampleRate) {
  const rowE = ROW_FREQS.map(f => goertzel(samples, f, sampleRate));
  const colE = COL_FREQS.map(f => goertzel(samples, f, sampleRate));

  const totalE = [...rowE, ...colE].reduce((s,v) => s+v, 0);
  const avgE   = totalE / 8;

  const maxRow = Math.max(...rowE);
  const maxCol = Math.max(...colE);

  // Both target freqs must dominate clearly above average noise
  if (maxRow < avgE * 3) return null;
  if (maxCol < avgE * 3) return null;

  const rowSorted = [...rowE].sort((a,b) => b-a);
  const colSorted = [...colE].sort((a,b) => b-a);
  const rowRatio  = rowSorted[1] > 0 ? rowSorted[0]/rowSorted[1] : 999;
  const colRatio  = colSorted[1] > 0 ? colSorted[0]/colSorted[1] : 999;

  if (rowRatio < 1.3 || colRatio < 1.3) return null;

  const rowIdx = rowE.indexOf(maxRow);
  const colIdx = colE.indexOf(maxCol);

  return {
    digit: DTMF_MAP[rowIdx][colIdx],
    rowIdx, colIdx,
    confidence: Math.min(rowRatio, colRatio)
  };
}

// ── Main DTMF decode ──────────────────────────────────────────
function decodeDTMF(samples, sampleRate, onProgress) {
  // 80ms window = 55+ cycles for lowest DTMF freq (697 Hz)
  // 20ms step   = fine enough to catch boundaries cleanly
  const windowSamp = Math.floor(sampleRate * 0.08);
  const stepSamp   = Math.floor(sampleRate * 0.02);

  const frames = [];
  const total  = Math.floor((samples.length - windowSamp) / stepSamp);

  for (let i = 0; i * stepSamp + windowSamp <= samples.length; i++) {
    const start  = i * stepSamp;
    const window = samples.subarray(start, start + windowSamp);
    frames.push(detectDigit(window, sampleRate));
    if (i % 50 === 0) onProgress((i / total) * 100);
  }

  // ── Run-length collapse with dead-zone gap suppression ────
  //
  // MIN_RUN = 4 frames × 20ms = 80ms minimum to accept a digit.
  //   → Transition artifacts (1-3 frames) are rejected.
  //   → Real DTMF tones (350ms default) = ~17 frames → always accepted.
  //
  // GAP_FRAMES = 3 frames × 20ms = 60ms dead zone after each digit.
  //   → Kills the "phantom 5" that appears during frequency transitions.

  const MIN_RUN    = 4;
  const GAP_FRAMES = 3;

  const digits    = [];
  const debugInfo = [];

  let curDigit      = null;
  let runFrames     = 0;
  let runConfs      = [];
  let gapCount      = 0;
  let lastCommitted = null;

  function commitRun() {
    if (curDigit && runFrames >= MIN_RUN) {
      const avgConf = runConfs.length
        ? runConfs.reduce((s,v)=>s+v,0)/runConfs.length : 1;
      if (curDigit !== lastCommitted) {
        digits.push(curDigit);
        debugInfo.push({ digit: curDigit, frames: runFrames, confidence: avgConf });
        lastCommitted = curDigit;
      }
      gapCount = GAP_FRAMES;
    }
    curDigit  = null;
    runFrames = 0;
    runConfs  = [];
  }

  frames.forEach(result => {
    // Dead zone — skip frames right after a committed digit
    if (gapCount > 0) {
      gapCount--;
      return;
    }

    const d = result ? result.digit : null;

    if (d === null) {
      // Silence — commit pending run and reset
      commitRun();
      lastCommitted = null;  // silence fully resets → same digit can appear again
    } else if (d === curDigit) {
      runFrames++;
      if (result.confidence) runConfs.push(result.confidence);
    } else {
      // Different digit — commit previous, start new
      commitRun();
      curDigit  = d;
      runFrames = 1;
      runConfs  = result.confidence ? [result.confidence] : [];
    }
  });
  commitRun();

  return { digits, debugInfo };
}

// ── Parse WAV ─────────────────────────────────────────────────
function parseWav(arrayBuffer) {
  const view = new DataView(arrayBuffer);
  const riff = String.fromCharCode(view.getUint8(0),view.getUint8(1),view.getUint8(2),view.getUint8(3));
  if (riff !== 'RIFF') throw new Error('Not a valid WAV file.');

  const channels   = view.getUint16(22, true);
  const sampleRate = view.getUint32(24, true);
  const bitsPerSmp = view.getUint16(34, true);

  let offset = 12, dataOffset = -1, dataSize = 0;
  while (offset < view.byteLength - 8) {
    const id = String.fromCharCode(view.getUint8(offset),view.getUint8(offset+1),view.getUint8(offset+2),view.getUint8(offset+3));
    const sz = view.getUint32(offset+4, true);
    if (id === 'data') { dataOffset = offset+8; dataSize = sz; break; }
    offset += 8 + sz;
  }
  if (dataOffset === -1) throw new Error('Could not find audio data in WAV file.');

  const bytesPerSample = bitsPerSmp / 8;
  const frameSize      = channels * bytesPerSample;
  const numFrames      = Math.floor(dataSize / frameSize);
  const samples        = new Float32Array(numFrames);

  for (let i = 0; i < numFrames; i++) {
    const byteOff = dataOffset + i * frameSize;
    let val;
    if      (bitsPerSmp === 16) val = view.getInt16(byteOff, true) / 32768.0;
    else if (bitsPerSmp === 8)  val = (view.getUint8(byteOff) - 128) / 128.0;
    else if (bitsPerSmp === 32) val = view.getInt32(byteOff, true) / 2147483648.0;
    else val = 0;
    samples[i] = val;
  }
  return { samples, sampleRate, channels, bitsPerSmp };
}

// ── Draw waveform ─────────────────────────────────────────────
let bitsPerSmpLabel = 16;

function drawWaveform(samples, sampleRate) {
  const canvas = document.getElementById('wave-canvas');
  canvas.width  = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#2d6a4f'; ctx.lineWidth=1.5;
  ctx.shadowColor='#2d6a4f'; ctx.shadowBlur=3;
  ctx.beginPath();
  const step = Math.ceil(samples.length / W);
  for (let x = 0; x < W; x++) {
    let peak = 0;
    for (let j = x*step; j < (x+1)*step && j < samples.length; j++) {
      if (Math.abs(samples[j]) > peak) peak = Math.abs(samples[j]);
    }
    x === 0 ? ctx.moveTo(0, H/2) : ctx.lineTo(x, H/2 - peak*(H/2-2));
  }
  ctx.stroke(); ctx.shadowBlur=0;
  document.getElementById('wave-info').textContent =
    `${(samples.length/sampleRate).toFixed(2)}s · ${sampleRate} Hz · ${bitsPerSmpLabel}-bit`;
}

// ── State ─────────────────────────────────────────────────────
let loadedSamples    = null;
let loadedSampleRate = null;

function showError(msg) {
  const box = document.getElementById('error-box');
  document.getElementById('error-text').textContent = msg;
  box.style.display = 'flex';
}
function hideError() { document.getElementById('error-box').style.display='none'; }

function showResult(digits, debugInfo) {
  document.getElementById('result-section').style.display = 'block';
  const code = digits.join('');
  document.getElementById('code-display').textContent = code || '——————';

  const row = document.getElementById('digit-row');
  row.innerHTML = '';
  digits.forEach((d,i) => {
    const box = document.createElement('div');
    box.className = 'digit-box';
    box.style.animationDelay = (i*80)+'ms';
    box.innerHTML = `<div class="d-num">${d}</div><div class="d-idx">#${i+1}</div>`;
    row.appendChild(box);
  });

  const avgConf = debugInfo.length
    ? debugInfo.reduce((s,d)=>s+d.confidence,0)/debugInfo.length : 0;
  document.getElementById('confidence-badge').textContent =
    `${digits.length} digit${digits.length!==1?'s':''} · ${avgConf.toFixed(1)}× confidence`;

  const maxF = Math.max(...debugInfo.map(d=>d.frames), 1);
  document.getElementById('debug-body').innerHTML = debugInfo.map((d,i) => `
    <div class="freq-row">
      <span style="width:18px;color:var(--accent);font-weight:600">${d.digit}</span>
      <span style="width:24px;color:var(--text-3)">#${i+1}</span>
      <div class="freq-bar-wrap"><div class="freq-bar" style="width:${Math.round(d.frames/maxF*100)}%"></div></div>
      <span style="width:56px;text-align:right">${d.frames} frames</span>
      <span style="width:48px;text-align:right">${d.confidence.toFixed(1)}×</span>
    </div>`).join('');
}

// ── File handling ─────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  hideError();
  document.getElementById('result-section').style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const { samples, sampleRate, bitsPerSmp } = parseWav(e.target.result);
      loadedSamples    = samples;
      loadedSampleRate = sampleRate;
      bitsPerSmpLabel  = bitsPerSmp;
      document.getElementById('wave-wrap').style.display = 'block';
      drawWaveform(samples, sampleRate);
      const dz = document.getElementById('drop-zone');
      dz.classList.add('has-file');
      document.getElementById('drop-title').textContent = `✓ ${file.name}`;
      document.getElementById('btn-decode').disabled = false;
    } catch(err) { showError(err.message); }
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('file-input').addEventListener('change', e => handleFile(e.target.files[0]));
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', ()  => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });

// ── Decode ────────────────────────────────────────────────────
document.getElementById('btn-decode').addEventListener('click', () => {
  if (!loadedSamples) return;
  hideError();
  document.getElementById('btn-decode').disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';

  setTimeout(() => {
    try {
      const { digits, debugInfo } = decodeDTMF(
        loadedSamples, loadedSampleRate,
        pct => { document.getElementById('progress-bar').style.width = pct+'%'; }
      );
      document.getElementById('progress-bar').style.width = '100%';
      setTimeout(() => {
        document.getElementById('progress-wrap').style.display = 'none';
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('btn-decode').disabled = false;
        if (digits.length === 0) {
          showError('No DTMF tones detected. Re-download the WAV from captcha.html and try again.');
        } else {
          showResult(digits, debugInfo);
        }
      }, 300);
    } catch(err) {
      showError(err.message);
      document.getElementById('btn-decode').disabled = false;
      document.getElementById('progress-wrap').style.display = 'none';
    }
  }, 50);
});

// ── Copy ──────────────────────────────────────────────────────
document.getElementById('btn-copy').addEventListener('click', function() {
  navigator.clipboard.writeText(document.getElementById('code-display').textContent).then(() => {
    this.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Copied!`;
    this.classList.add('copied');
    setTimeout(() => {
      this.innerHTML = `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy Code`;
      this.classList.remove('copied');
    }, 2000);
  });
});

// ── Debug toggle ──────────────────────────────────────────────
document.getElementById('debug-toggle').addEventListener('click', () => {
  const body = document.getElementById('debug-body');
  const arrow = document.getElementById('debug-arrow');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
});
</script>
</body>
